[tools]
bun = "latest"
opentofu = "latest"
uv = "latest"
mago = "latest"
ruff = "latest"
tombi = "latest"
rumdl = "latest"
jq = "latest"
rust = { version = "1.84.0", components = "rustfmt,clippy", targets = "wasm32-wasip1" }
# Per-language interpreters (Python, Ruby, PHP) are intentionally
# NOT pinned at this top level. Each task / command declares the version
# it needs next to where it is invoked, so different recipes can use
# different versions without churning this file:
#   - Python: `mise exec uv -- uv run --python 3.13 …`
#     (UV is a superset tool — version manager + pip + venv + scripts —
#     so it owns Python on its own; mise just installs UV.)
#   - Ruby / conda:php: per-task `tools = { ruby = "3.3.3" }` etc., or
#     ad-hoc `mise exec ruby@3.3.3 -- ruby …`. mise auto-downloads the
#     requested version on first call, the same way UV does for Python.
# PHP keeps the `conda:` backend prefix because vfox (mise's default PHP
# backend) has download issues that surfaced during Phase 2.

[settings]
experimental = true

[deps.bun-docs]
sources = ["docs/package.json", "docs/bun.lock"]
run = "bun install"
dir = "docs"

[deps.bun-mcp]
sources = ["packages/mcp-server/package.json", "packages/mcp-server/bun.lock"]
run = "bun install"
dir = "packages/mcp-server"

[deps.bun-wasm]
sources = ["src/layer1_wasm/package.json", "src/layer1_wasm/bun.lock"]
run = "bun install"
dir = "src/layer1_wasm"

[deps.tofu]
sources = ["infra/github/versions.tf", "infra/github/providers.tf"]
outputs = ["infra/github/.terraform.lock.hcl"]
run = "tofu init"
dir = "infra/github"

[hooks]
enter = ["mise upgrade -q", "mise deps -q"]

# ─────────────────────────────────────────────────────────────────────────
# Tasks — reproducing locally what CI does, and what humans need to ship.
# Run `mise tasks` to list, `mise run <name>` to invoke.
# Namespaces:
#   docs:*      — rspress documentation site
#   repro:*     — Layer 1 (WASM) reproduction sources & verification
#   docker:*    — Layer 2 (Docker) reproduction images
#   recipes:*   — recipes catalogue index regeneration
#   mcp:*       — MCP server package (packages/mcp-server)
#   infra:*     — OpenTofu (infra/github)
#   ci:*        — local-equivalent of the GitHub Actions workflows
# ─────────────────────────────────────────────────────────────────────────

# ── Docs site (rspress) ──────────────────────────────────────────────────

[tasks."docs:install"]
description = "Install docs site dependencies"
dir = "docs"
run = "bun install"

[tasks."docs:dev"]
description = "Run rspress dev server on :3000 (auto-runs prebuild-repro)"
dir = "docs"
run = "bun run dev"

[tasks."docs:build"]
description = "Build static docs site to docs/doc_build/"
depends = ["docs:install"]
dir = "docs"
run = "bun run build"

[tasks."docs:preview"]
description = "Preview the built static docs site"
dir = "docs"
run = "bun run preview"

[tasks."docs:fmt"]
description = "Format docs/ JS/TS/CSS/JSON with Biome (in-place)"
depends = ["docs:install"]
dir = "docs"
run = "bun x --bun biome format --write ."

[tasks."docs:lint"]
description = "Lint docs/ with Biome (read-only, exits non-zero on errors)"
depends = ["docs:install"]
dir = "docs"
run = "bun x --bun biome lint ."

[tasks."docs:check"]
description = "Biome check (format + lint + import-organize, read-only)"
depends = ["docs:install"]
dir = "docs"
run = "bun x --bun biome check ."

[tasks."docs:check:fix"]
description = "Biome check + apply safe + unsafe auto-fixes"
depends = ["docs:install"]
dir = "docs"
run = "bun x --bun biome check --write --unsafe ."

# ── Layer 1 — WASM reproduction sources ──────────────────────────────────

[tasks."repro:install"]
description = "Install Layer 1 (WASM) sources dependencies"
dir = "src/layer1_wasm"
run = "bun install"

[tasks."repro:typecheck"]
description = "TypeScript type-check Layer 1 sources + tests"
depends = ["repro:install"]
dir = "src/layer1_wasm"
run = "bun run typecheck"

[tasks."repro:build:ts"]
description = "Compile Layer 1 TypeScript to .js next to each repro"
depends = ["repro:install"]
dir = "src/layer1_wasm"
run = "bun run build"

[tasks."repro:build:rust"]
description = "Compile Layer 1 Rust crates (regex-779 etc.) to wasm32-wasip1"
shell = "bash -c"  # need `set -o pipefail` and `shopt`, neither in POSIX sh
run = '''
set -euo pipefail
shopt -s nullglob
for cargo_toml in src/layer1_wasm/*/Cargo.toml; do
  slug_dir=$(dirname "$cargo_toml")
  echo "==> cargo build $slug_dir"
  cargo build --release --target wasm32-wasip1 --manifest-path "$cargo_toml"
  cp "${slug_dir}/target/wasm32-wasip1/release/repro.wasm" "${slug_dir}/repro.wasm"
done
'''

[tasks."repro:build"]
description = "Build all Layer 1 reproductions (TS + Rust wasm)"
depends = ["repro:build:ts", "repro:build:rust"]

[tasks."repro:test"]
description = "Run Playwright contract-v1 regression suite for Layer 1"
depends = ["repro:install"]
dir = "src/layer1_wasm"
run = '''
bunx playwright install --with-deps chromium
bun run test
'''

# ── Native re-verification (run repros against host interpreters) ───────

[tasks."repro:native:python"]
description = "Run every src/layer1_wasm/*/repro.py against host Python (auto-discovered; PEP 723 inline metadata pins each script's deps)"
shell = "bash -c"  # need `set -o pipefail` and `shopt`, neither in POSIX sh
run = '''
set -euo pipefail
shopt -s nullglob
matched=0
for f in src/layer1_wasm/*/repro.py; do
  matched=1
  echo "== $f =="
  mise exec uv -- uv run --python 3.13 "$f"
done
if [ "$matched" -eq 0 ]; then
  echo "[repro:native:python] no src/layer1_wasm/*/repro.py found — nothing to run" >&2
fi
'''

[tasks."repro:native:ruby"]
description = "Run Ruby repros against host Ruby (3.3.x pin)"
tools = { ruby = "3.3.3" }
run = "ruby src/layer1_wasm/ruby-21709/repro.rb"

[tasks."repro:native:php"]
description = "Run PHP repros against host PHP (php-wasm-equivalent build)"
tools = { "conda:php" = "latest" }
run = "php src/layer1_wasm/php-12167/repro.php"

[tasks."repro:native:rust"]
description = "Run Rust repros against host Rust toolchain"
run = "cargo run --release --manifest-path src/layer1_wasm/regex-779/Cargo.toml"

[tasks."repro:native"]
description = "Run all repros against host interpreters/compilers"
depends = [
  "repro:native:python",
  "repro:native:ruby",
  "repro:native:php",
  "repro:native:rust"
]

# ── Layer 2 — Docker reproduction images ─────────────────────────────────

[tasks."docker:build"]
description = "Build all Layer 2 Docker reproduction images locally"
shell = "bash -c"  # need `set -o pipefail` and `shopt`, neither in POSIX sh
run = '''
set -euo pipefail
shopt -s nullglob
for dockerfile in src/layer2_docker/*/Dockerfile; do
  slug_dir=$(dirname "$dockerfile")
  slug=$(basename "$slug_dir")
  case "$slug" in _*) continue ;; esac  # skip _template/ etc.
  echo "==> docker build vivarium-${slug}:dev"
  docker build -t "vivarium-${slug}:dev" "$slug_dir"
done
'''

[tasks."docker:run"]
description = "Run a Layer 2 reproduction (set SLUG=<recipe>; e.g. SLUG=postgres-lost-update)"
run = '''
if [ -z "${SLUG:-}" ]; then
  echo "usage: SLUG=<recipe> mise run docker:run"
  echo "available:" && ls src/layer2_docker | grep -v "^_" | sed "s/^/  /"
  exit 1
fi
docker run --rm "vivarium-${SLUG}:dev"
'''

[tasks."docker:capture-verdicts"]
description = "Build every Layer 2 image + capture verdict.json into the slug dir (local dev parity with the CI snapshot — lets `bun --cwd docs run dev` show real verdicts)"
depends = ["docker:build"]
shell = "bash -c"  # need `set -o pipefail` and `shopt`, neither in POSIX sh
run = '''
set -euo pipefail
shopt -s nullglob
# verdict.json is gitignored under src/layer2_docker/**/verdict.json,
# so this writes purely local files — running this task does not
# add anything to the index. CI is the canonical producer; this is
# a developer convenience for `localhost:3000` rendering parity.
for dockerfile in src/layer2_docker/*/Dockerfile; do
  slug_dir=$(dirname "$dockerfile")
  slug=$(basename "$slug_dir")
  case "$slug" in _*) continue ;; esac  # skip _template/ etc.
  tag="vivarium-${slug}:dev"
  echo "==> capture verdict.json for ${slug}"
  bash scripts/capture_layer2_verdict.sh "$tag" "${slug_dir}/verdict.json"
done
echo "Done. Refresh http://localhost:3000/vivarium/repro/<slug>/ to see captured verdicts."
'''

# ── Branch-fix publish (Path B, PAT-push) ────────────────────────────────
#
# Some Layer 2 recipes wrap an upstream project whose build is too heavy
# for free-tier GitHub Actions runners (Node.js, Chromium, etc.) — the
# contributor builds the branch-fix image locally and pushes to their
# own ghcr.io namespace before triggering branch-fix-verdict.yml.
#
# These tasks read a PAT from a per-user file (default
# `${XDG_CONFIG_HOME:-~/.config}/vivarium/ghcr-pat`, mode 0600) and feed
# it to `docker login --password-stdin`, then `docker logout` after the
# push so the credential is never persisted in the docker config. The
# `gh` CLI auth state is never touched — branch-fix push uses a
# write:packages-scoped classic PAT, distinct from the all-purpose
# `gh` token. (ghcr.io does not currently support fine-grained PATs
# for container-registry auth, so a classic PAT is the only option.)

[tasks."ghcr:login"]
description = "Log in to ghcr.io using a write:packages-scoped PAT file (does not touch gh CLI auth state)"
shell = "bash -c"
run = '''
set -euo pipefail
pat_file="${VIVARIUM_GHCR_PAT_FILE:-${XDG_CONFIG_HOME:-$HOME/.config}/vivarium/ghcr-pat}"
if [ ! -f "$pat_file" ]; then
  cat <<EOF >&2
ghcr.io PAT file not found: $pat_file

One-time setup (ghcr.io requires a CLASSIC PAT; fine-grained PATs are
not supported for container-registry auth as of this writing — see
https://docs.github.com/en/packages/working-with-a-github-packages-registry/working-with-the-container-registry):

  1. https://github.com/settings/tokens/new?scopes=write:packages
     - Note: e.g. "vivarium-ghcr-push"
     - Expiration: 30 days (or shorter)
     - Scopes: write:packages (auto-includes read:packages)
  2. mkdir -p "\$(dirname "$pat_file")"
  3. printf '%s' '<paste-token>' > "$pat_file" && chmod 600 "$pat_file"

The file is read at push time only; the credential is dropped from the
docker config immediately after \`branch-fix:publish\` completes.
EOF
  exit 1
fi
user="${GHCR_USER:-$(gh api user --jq .login 2>/dev/null || true)}"
[ -z "$user" ] && { echo "Set GHCR_USER=<username> or run 'gh auth login'." >&2; exit 1; }
docker login ghcr.io -u "$user" --password-stdin < "$pat_file"
'''

[tasks."branch-fix:publish"]
description = "Build a branch-fix image and push to ghcr.io/<user>/vivarium-<slug>-fix:<tag>; auto-logout after push"
depends = ["ghcr:login"]
shell = "bash -c"
usage = '''
arg "<slug>"       help="recipe slug under src/layer2_docker/ (e.g. node-63041)"
arg "<tag>"        help="image tag, typically the fix commit SHA (e.g. 04d86dab)"
arg "<dockerfile>" help="path to the branch-fix Dockerfile"
arg "<context>"    help="docker build context dir"
'''
run = '''
set -euo pipefail
slug="{{usage.slug}}"
tag="{{usage.tag}}"
dockerfile="{{usage.dockerfile}}"
context="{{usage.context}}"
user="${GHCR_USER:-$(gh api user --jq .login)}"
img="ghcr.io/${user,,}/vivarium-${slug}-fix:${tag}"
echo "==> docker build $img"
docker build -t "$img" -f "$dockerfile" "$context"
echo "==> docker push $img"
docker push "$img"
docker logout ghcr.io
echo "$img"
'''

[tasks."branch-fix:verdict"]
description = "Trigger aletheia-works/vivarium branch-fix-verdict.yml against a published image (thin wrapper over `gh workflow run`)"
shell = "bash -c"
usage = '''
arg "<slug>"  help="recipe slug under src/layer2_docker/"
arg "<image>" help="published image ref (e.g. ghcr.io/<user>/vivarium-<slug>-fix:<sha>)"
flag "--expected <verdict>" help="expected branch-fix verdict (default: unreproduced)" default="unreproduced"
'''
run = '''
set -euo pipefail
slug="{{usage.slug}}"
image="{{usage.image}}"
expected="{{usage.expected}}"
gh workflow run branch-fix-verdict.yml \
  --repo aletheia-works/vivarium \
  --field "slug=${slug}" \
  --field "branch_image=${image}" \
  --field "expected_verdict=${expected}"
echo "Triggered. Tail with:"
echo "  gh run list --repo aletheia-works/vivarium --workflow=branch-fix-verdict.yml --limit 1"
echo "  gh run watch --repo aletheia-works/vivarium <run-id>"
'''

# ── Recipes catalogue index ──────────────────────────────────────────────

[tasks."recipes:index"]
description = "Regenerate docs/public/api/recipes.json from src/layer*/"
dir = "docs"
run = "bun run generate-index"

[tasks."recipes:new"]
description = "Scaffold a new Layer 2 recipe directory from src/layer2_docker/_template/"
dir = "docs"
shell = "bash -c"
usage = '''
arg "<project>" help="upstream project name (kebab-case, e.g. node, cpython)"
arg "<issue>" help="upstream issue number"
arg "<title>" help="bug title (one line)"
flag "--base <image>" help="docker base image (e.g. node:26-slim)"
flag "--repo <owner/repo>" help="upstream owner/repo override (default: heuristic per project)"
'''
run = '''bun run scripts/new-recipe.ts "{{usage.project}}" "{{usage.issue}}" "{{usage.title}}"{% if usage.base %} --base "{{usage.base}}"{% endif %}{% if usage.repo %} --repo "{{usage.repo}}"{% endif %}'''

[tasks."recipes:verify"]
description = "Verify a single Layer 2 recipe end-to-end (build + run + verdict + schema + indices + lint + docs build)"
shell = "bash -c"
usage = '''
arg "<slug>" help="recipe slug under src/layer2_docker/ (e.g. node-63041)"
'''
run = '''
set -euo pipefail

slug="{{usage.slug}}"
recipe_dir="src/layer2_docker/${slug}"

if [ ! -d "${recipe_dir}" ]; then
  echo "Error: ${recipe_dir} does not exist."
  echo "Available Layer 2 recipes:"
  for d in src/layer2_docker/*/; do
    name=$(basename "$d")
    case "$name" in _*) continue ;; esac
    echo "  $name"
  done
  exit 1
fi
if [ ! -f "${recipe_dir}/Dockerfile" ]; then
  echo "Error: ${recipe_dir}/Dockerfile is missing."
  exit 1
fi

echo "==> [1/6] ensure docs/ deps installed (ajv-cli ships there as devDep)"
(cd docs && bun install --frozen-lockfile)
# capture_layer2_verdict.sh uses `${AJV_BIN:-ajv}`; point it at
# docs/node_modules/.bin/ajv.exe (the devDep we just installed) so
# we do not need a bun-global ajv on PATH.
export AJV_BIN="$(cd docs/node_modules/.bin && pwd)/ajv.exe"

echo "==> [2/6] docker build ${slug}"
tag="vivarium-${slug}:dev"
docker build -t "${tag}" "${recipe_dir}"

echo "==> [3/6] docker run + capture verdict + schema-validate"
bash scripts/capture_layer2_verdict.sh "${tag}" "${recipe_dir}/verdict.json"

echo "==> [4/6] regenerate recipes / projects indices + biome check"
(cd docs && bun run generate-index && bun run generate-project-pages)
mise run docs:check

echo "==> [5/6] markdown lint"
mise run markdown:check

echo "==> [6/6] docs build (rspress)"
(cd docs && bun run build)

verdict=$(jq -r '.verdict' "${recipe_dir}/verdict.json")
exit_code=$(jq -r '.exit_code' "${recipe_dir}/verdict.json")
echo
echo "✓ Recipe ${slug} verified end-to-end"
echo "  verdict: ${verdict}"
echo "  exit_code: ${exit_code}"
'''

# ── MCP server (packages/mcp-server) ─────────────────────────────────────

[tasks."mcp:install"]
description = "Install vivarium-mcp dependencies"
dir = "packages/mcp-server"
run = "bun install"

[tasks."mcp:build"]
description = "Build the MCP server package"
depends = ["mcp:install"]
dir = "packages/mcp-server"
run = "bun run build"

[tasks."mcp:test"]
description = "Test the MCP server package"
depends = ["mcp:install"]
dir = "packages/mcp-server"
run = "bun run test"

# ── Infra (OpenTofu) ─────────────────────────────────────────────────────

[tasks."infra:init"]
description = "Initialise OpenTofu working directory for infra/github"
dir = "infra/github"
run = "tofu init"

[tasks."infra:fmt"]
description = "Auto-format all OpenTofu files (infra/)"
dir = "infra"
run = "tofu fmt -recursive"

[tasks."infra:plan"]
description = "Plan the OpenTofu deployment for infra/github"
depends = ["infra:init"]
dir = "infra/github"
run = "tofu plan"

[tasks."infra:apply"]
description = "Apply OpenTofu changes (PRODUCTION — review the plan first)"
depends = ["infra:init"]
dir = "infra/github"
run = "tofu apply"

# ── Local CI equivalents (what GitHub Actions runs) ──────────────────────

[tasks."ci:docs"]
description = "Local docs build sanity (mirrors the build step inside test-docs.yml's E2E lane)"
dir = "docs"
run = '''
bun install --frozen-lockfile
bun run build
'''

[tasks."ci:repro"]
description = "Local equivalent of repro-regression.yml (typecheck + build + Playwright)"
dir = "src/layer1_wasm"
shell = "bash -c"  # need `set -o pipefail`, not in POSIX sh
run = '''
set -euo pipefail
bun install --frozen-lockfile
bun run typecheck
bun run build
bunx playwright install --with-deps chromium
bun run test
'''

[tasks."ci:mcp"]
description = "Local equivalent of test-mcp.yml"
dir = "packages/mcp-server"
run = '''
bun install --frozen-lockfile
bun run test
'''

[tasks."ci:docs-unit"]
description = "Local equivalent of test-docs.yml unit lane (resolveReproFile etc.)"
dir = "docs"
run = '''
bun install --frozen-lockfile
bun run test:unit
'''

[tasks."ci:docs-e2e"]
description = "Local equivalent of test-docs.yml E2E lane (Playwright against rspress preview, Chromium + Firefox + WebKit)"
dir = "docs"
shell = "bash -c"  # need `set -o pipefail`
run = '''
set -euo pipefail
bun install --frozen-lockfile
bunx playwright install --with-deps chromium firefox webkit
bun run test:e2e
'''

[tasks."ci:commitlint"]
description = "Lint the most recent commit message against Conventional Commits"
run = "bunx commitlint --from HEAD~1 --to HEAD --verbose"

[tasks."ci:all"]
description = "Run all local CI tasks (docs + lint + mcp + repro + docs-unit + docs-e2e + commitlint)"
depends = [
  "ci:docs",
  "ci:lint",
  "ci:mcp",
  "ci:repro",
  "ci:docs-unit",
  "ci:docs-e2e",
  "ci:commitlint"
]

# ── Polyglot Rust-based formatters and linters ───────────────────────────

[tasks."php:check"]
description = "Mago — PHP format check + lint (read-only)"
run = "mago format --check && mago lint"

[tasks."php:check:fix"]
description = "Mago — apply PHP format + lint --fix --unsafe (in-place)"
run = "mago format && mago lint --fix --unsafe"

[tasks."python:check"]
description = "Ruff — Python format check + lint (read-only)"
run = "ruff format --check && ruff check"

[tasks."python:check:fix"]
description = "Ruff — apply Python format + lint --fix (in-place)"
run = "ruff format && ruff check --fix"

[tasks."toml:check"]
description = "Tombi — TOML format check + lint (read-only)"
run = "tombi format --check && tombi lint"

[tasks."toml:check:fix"]
description = "Tombi — apply TOML format (in-place)"
run = "tombi format"

[tasks."markdown:check"]
description = "rumdl — Markdown lint (read-only)"
run = "rumdl check ."

[tasks."markdown:check:fix"]
description = "rumdl — apply Markdown autofix (in-place)"
run = "rumdl fmt ."

[tasks."rust:check"]
description = "cargo fmt --check + cargo clippy --deny warnings on Layer 1 Rust crates"
shell = "bash -c"
run = '''
set -euo pipefail
shopt -s nullglob
for cargo_toml in src/layer1_wasm/*/Cargo.toml; do
  echo "==> cargo fmt --check + clippy $cargo_toml"
  cargo fmt --manifest-path "$cargo_toml" --check
  cargo clippy --manifest-path "$cargo_toml" --target wasm32-wasip1 --release -- -D warnings
done
'''

[tasks."rust:check:fix"]
description = "cargo fmt --apply + clippy --fix on Layer 1 Rust crates"
shell = "bash -c"
run = '''
set -euo pipefail
shopt -s nullglob
# `--allow-no-vcs` is needed because Sapling (.sl/) isn't recognised by
# cargo as a VCS — cargo fix would otherwise refuse to write changes.
for cargo_toml in src/layer1_wasm/*/Cargo.toml; do
  echo "==> cargo fmt + clippy --fix $cargo_toml"
  cargo fmt --manifest-path "$cargo_toml"
  cargo clippy --manifest-path "$cargo_toml" --target wasm32-wasip1 --release --fix --allow-no-vcs --allow-dirty --allow-staged
done
'''

[tasks."lint:all"]
description = "Run all formatters/linters (read-only) — Biome + Mago + Ruff + Taplo + rumdl + Rust"
depends = [
  "docs:check",
  "php:check",
  "python:check",
  "toml:check",
  "markdown:check",
  "rust:check"
]

[tasks."lint:all:fix"]
description = "Apply all autofixes (in-place) across every language"
depends = [
  "docs:check:fix",
  "php:check:fix",
  "python:check:fix",
  "toml:check:fix",
  "markdown:check:fix",
  "rust:check:fix",
]

[tasks."ci:lint"]
description = "Local equivalent of test-lint-check.yml (Biome + Mago + Ruff + Tombi + rumdl + Rust)"
depends = [
  "docs:check",
  "php:check",
  "python:check",
  "toml:check",
  "markdown:check",
  "rust:check"
]
