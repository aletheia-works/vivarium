"scope: ci":
  - changed-files:
      - any-glob-to-any-file:
          - ".github/workflows/**"
          - ".github/dependabot.yml"
          - ".github/labeler.yml"
          - ".github/release.yml"
          - ".github/ISSUE_TEMPLATE/**"
          - ".github/PULL_REQUEST_TEMPLATE.md"
          - "mise.toml"
          - ".gitignore"
          - ".editorconfig"
          - ".gitattributes"

"scope: docs":
  - changed-files:
      - any-glob-to-any-file:
          - "docs/**"
          - "**/*.mdx"

"scope: infra":
  - changed-files:
      - any-glob-to-any-file:
          - "infra/**"

"scope: python":
  - changed-files:
      - any-glob-to-any-file:
          - "**/*.py"
          - "**/pyproject.toml"
          - "**/requirements*.txt"
          - "**/poetry.lock"
          - "**/uv.lock"

"scope: rust":
  - changed-files:
      - any-glob-to-any-file:
          - "**/*.rs"
          - "**/Cargo.toml"
          - "**/Cargo.lock"
          - "**/rust-toolchain*"

"scope: js":
  - changed-files:
      - any-glob-to-any-file:
          - "**/*.{js,jsx,ts,tsx,mjs,cjs}"
          - "**/package.json"
          - "**/package-lock.json"
          - "**/pnpm-lock.yaml"
          - "**/bun.lock"
          - "**/tsconfig*.json"
          - "**/*.css"
          - "**/jsr.json"

"scope: wasm":
  - changed-files:
      - any-glob-to-any-file:
          - "**/*.wasm"
          - "**/*.wat"
          - "**/wasm/**"
          - "**/*_wasm/**"
          - "**/*.php"
          - "**/*.rb"
          - "src/layer1_wasm/**"
          - "src/external_examples/**"
          - "**/.vivarium/**"

"scope: docker":
  - changed-files:
      - any-glob-to-any-file:
          - "**/Dockerfile*"
          - "**/docker-compose*.yml"
          - "**/docker-compose*.yaml"
          - "**/.dockerignore"
          - "src/layer2_docker/**"
          - "src/layer3_thirdway/**"

# `type: *` labels are primarily set from the PR title's Conventional
# Commits prefix by the inline title-parsing step in
# .github/workflows/labeler.yml — `commitlint.yml` enforces that
# prefix at PR open time, so the title is reliable.
#
# `type: docs` keeps a path-based fallback below: when every changed
# file is markdown / docs, the path rule applies the label. The
# title step still wins on conflicts (it removes any other `type: *`
# before applying its own), so this is a fallback for the rare PR
# that uses a non-`docs:` Conventional Commits type for a doc-only
# change.

"type: docs":
  # `any-glob-to-all-files` (not `-any-file`): apply only when every
  # changed file matches one of these doc patterns.
  - changed-files:
      - any-glob-to-all-files:
          - "**/*.md"
          - "docs/docs/**"
          - "LICENSE"
