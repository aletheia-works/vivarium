name: Check Conventional Commit

# Validates commit messages against the Conventional Commits specification.
# Delegates to the reusable workflow in aletheia-works/.github; the
# reusable workflow also posts the PR result as a comment, so no separate
# listener is needed here.

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  check:
    uses: aletheia-works/.github/.github/workflows/commitlint.yml@2869d127c99b5cd8bcfb22d7ade8a31d1204019c # main
