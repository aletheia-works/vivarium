name: Claude reviews pull requests

# On every non-draft PR (opened, ready-for-review, or pushed to), Claude Code
# reads the diff, evaluates it against `AGENTS.md` / `CLAUDE.md` / the linked
# Issue, and posts a single GitHub review (`COMMENT` or `REQUEST_CHANGES`).
# Claude must NOT use `APPROVE` — that stays a human decision per
# `AGENTS.md` § 2.
#
# This workflow replaces the previous CodeRabbit-response flow: substance
# review now comes from Claude itself, not a third-party bot.
#
# Abuse guard: the workflow runs unconditionally for PRs authored by the
# repository owner (hard-coded below). For PRs from any other author, it
# skips Claude unless the PR carries the `ai: approved` label — which only
# the owner adds after a manual trust check. This prevents a third party
# from coercing Claude into reviewing (and potentially leaking signal about)
# arbitrary code on their PR.
#
# Prerequisites (one-time setup):
# - `CLAUDE_CODE_OAUTH_TOKEN` repo secret — same token as
#   `claude-implement.yml` (Claude Max subscription OAuth token).
# - Claude GitHub App installed on `aletheia-works/vivarium` so reviews are
#   posted as `claude[bot]`.
# - `ai: approved` label exists in `infra/github/labels.tf` and has been
#   `tofu apply`-ed before this workflow fires for non-owner PRs.

on:
  pull_request:
    types: [opened, reopened, ready_for_review, synchronize]

permissions:
  # Read-only source tree: this workflow reviews, it does not push fixes.
  contents: read
  # Post the review itself.
  pull-requests: write
  # Required by anthropics/claude-code-action to mint a short-lived OIDC
  # token for the Claude GitHub App identity.
  id-token: write

concurrency:
  # Cancel stale review runs when a new push lands — only the latest state
  # matters, and reviewing every intermediate SHA burns Max quota.
  group: claude-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    # Skip drafts — reviewing work-in-progress is noise. Human flips the PR
    # to ready-for-review when they want a review.
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - name: Check authorisation (owner-or-approval gate)
        id: auth
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const OWNER = 'JamBalaya56562';
            const APPROVED_LABEL = 'ai: approved';

            const pr = context.payload.pull_request;
            const authorLogin = pr?.user?.login ?? '';
            const labels = (pr?.labels || []).map(l => l.name);

            const isOwner = authorLogin === OWNER;
            const isApproved = labels.includes(APPROVED_LABEL);
            const allowed = isOwner || isApproved;

            core.info(`PR author: ${authorLogin}`);
            core.info(`PR labels: ${labels.join(', ') || '(none)'}`);
            core.info(`Is owner: ${isOwner}`);
            core.info(`Has "${APPROVED_LABEL}" label: ${isApproved}`);
            core.info(`Proceed with Claude review: ${allowed}`);

            if (!allowed) {
              core.notice(
                `Skipping Claude review: PR author "${authorLogin}" is not the repository owner ` +
                `and the "${APPROVED_LABEL}" label is not present. ` +
                `The owner must add the label to authorise automated review.`
              );
            }

            core.setOutput('allowed', allowed ? 'true' : 'false');

      - name: Checkout PR head
        if: steps.auth.outputs.allowed == 'true'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Let Claude review the PR
        if: steps.auth.outputs.allowed == 'true'
        uses: anthropics/claude-code-action@38ec876110f9fbf8b950c79f534430740c3ac009 # v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # When Claude's own implementation workflow pushes to a PR branch
          # (claude[bot] sender on `synchronize`), the action's human-actor
          # check would abort without this allowlist. Narrow to `claude`
          # only — not `*` — to keep the surface tight.
          allowed_bots: "claude"
          prompt: |
            You are reviewing PR #${{ github.event.pull_request.number }}
            on `${{ github.repository }}`. Head SHA:
            `${{ github.event.pull_request.head.sha }}`.

            ## Your task

            1. Read `AGENTS.md` and `CLAUDE.md` at the repo root — they are
               the project's guardrails and conventions. Your review must
               measure the PR against them.

            2. Fetch the PR metadata, diff, and linked Issue:

               ```
               gh pr view ${{ github.event.pull_request.number }} --repo ${{ github.repository }} --json title,body,labels,files,author
               gh pr diff ${{ github.event.pull_request.number }} --repo ${{ github.repository }}
               ```

               If the PR body references `Closes #N` / `Fixes #N`, also
               fetch that Issue with `gh issue view` and verify the diff
               actually satisfies the acceptance criteria.

            3. Review posture — substance over style:
               - Flag unverified claims, hallucinated APIs, invented
                 citations, copy-paste advice, security issues, state-safety
                 issues, missing-provider-pinning, broad IAM, and anything
                 that contradicts `AGENTS.md` / the ADRs.
               - Do NOT flag indentation, line length, naming, prose style.
                 Formatters, linters, and `tofu fmt` handle those.
               - For `.github/workflows/**`: flag floating-tag action pins,
                 missing `permissions:` blocks, secret-leak risk, overly
                 broad `GITHUB_TOKEN` scopes.
               - For `infra/**/*.tf`: flag state-safety issues, missing
                 provider pinning, broad permissions, destroy-on-apply risk.
               - For `**/*.md`: check factual accuracy, broken internal
                 links, and coherence with `docs/vision.md` /
                 `docs/non-goals.md` / the ADRs.
               - For `docs/decisions/**`: ADRs are historical records. Do
                 not request edits to accepted ADRs — request a superseding
                 ADR instead.

            4. Scope-creep check. The diff must match the PR title's
               Conventional-Commit prefix and the linked Issue's acceptance
               criteria. A `fix:` PR bundling a refactor is a defect.

            5. AI-disclosure check. If the PR looks AI-authored (tone,
               structure, suspicious "helpfulness") but does not carry the
               `ai: generated` label, flag it in the review. Do NOT add the
               label yourself — labelling is mechanical only
               (`AGENTS.md` § 4.6).

            6. Post exactly one review via `gh pr review`:
               - `--request-changes` with `--body "..."` if you found
                 actionable defects.
               - `--comment` with `--body "..."` if your findings are
                 advisory or you have no defects.
               - NEVER `--approve`. Approval is a human decision
                 (`AGENTS.md` § 2).

               The body should be terse and structured:
               - A 1–2 sentence verdict.
               - A bulleted list of findings, each prefixed with severity
                 (`blocker:`, `concern:`, `nit:` — use `nit:` sparingly, and
                 only when the issue is real and mechanical tools do not
                 already catch it).
               - A final line stating what, if anything, you verified by
                 hand (linked-issue match, ADR coherence, etc.).

               If you have literally nothing substantive to say, post a
               `--comment` review with a single line: "No substantive
               findings." Do not pad.

            7. Do NOT push commits, do NOT edit files, do NOT add or remove
               labels. This workflow is review-only. Fix proposals go in
               the review body; applying them is a separate flow.

            ## Hard constraints (from AGENTS.md § 2)

            You MUST NOT:
            - Approve or merge any PR.
            - Push to `main` or to the PR branch.
            - Create, rotate, or export secrets.
            - Modify branch protection or organisation settings.
            - Add or remove labels (mechanical labelling only).
            - Respond to the PR author on behalf of external users — the
              review body is fine; ad-hoc community dialogue is not.

            If a step would cross any of these, STOP and exit without
            posting. Fail closed.
          claude_args: |
            --max-turns 10
            --allowedTools "Read,Glob,Grep,Bash(gh:*),Bash(git:*)"
