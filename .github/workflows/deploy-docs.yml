name: deploy-docs

# Builds the rspress docs site and deploys to GitHub Pages, alongside
# browser-native reproduction pages.
#
# Prerequisites (one-time setup):
# - Repo Settings → Pages → Source: "GitHub Actions".
#
# Tooling: multi-tool job (bun + rust) — uses the official
# `jdx/mise-action` directly so CI reads the same `mise.toml` as local
# development. Single-tool workflows (publish-mcp, branch-fix-verdict)
# use `oven-sh/setup-bun` directly instead.
#
# Layout:
# - `docs/` holds the rspress site (config, lockfile, markdown content).
# - `docs/site/` is the rspress `root` and contains the markdown.
# - The build artefact is written to `docs/doc_build/`.
# - `src/layer1_wasm/<slug>/` directories are static Pyodide / WASM
#   reproductions. Sources are TypeScript; `tsc` emits side-by-side
#   `.js` files which are then copied verbatim into
#   `docs/doc_build/repro/<project>/<issue_path>/`. The `.js` outputs
#   are gitignored — the deploy step rebuilds them from the `.ts`
#   sources via `src/layer1_wasm/package.json`'s `build` script. The
#   per-recipe `<project>/<issue_path>` URL path is read from each
#   entry's `page_url` in `docs/site/public/api/recipes.json` so the bundling
#   step shares the canonical mapping with the rest of the catalogue.
# - Underscore-prefixed subdirectories (e.g. `src/layer1_wasm/_shared/`)
#   hold scaffolding shared across reproductions. They are bundled under
#   each `repro/<project>/` directory so recipes can reference shared
#   modules via `../_shared/…`.
on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'src/layer1_wasm/**'
      - 'src/layer2_docker/**'
      - 'mise.toml'
      - '.github/workflows/deploy-docs.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  # Required to push images to ghcr.io/aletheia-works/* using the
  # default `GITHUB_TOKEN`. Layer 2 reproductions only.
  packages: write

# Serialise deploys to Pages — never cancel an in-flight deploy; queue.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    # Runs unconditionally on the upstream `aletheia-works/vivarium` repo.
    # Forks skip the build by default (the push trigger fires in every
    # fork with Actions enabled, but most forks do not want Pages to
    # deploy from this workflow). A fork user who DOES want their own
    # `<owner>.github.io/<repo>/` site can opt in by setting a single
    # repository variable: Settings → Secrets and variables → Actions
    # → Variables → New repository variable, name `VIVARIUM_FORK_DEPLOY`,
    # value `true`. Layer 2 image build/push remains gated below to
    # `aletheia-works` only — fork deploys ship Layer 1 only.
    if: github.repository_owner == 'aletheia-works' || vars.VIVARIUM_FORK_DEPLOY == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: docs
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0 # for `lastUpdated` timestamps

      - name: Setup mise (bun, uv, jq)
        # Installs the tools needed before the first `mise run` (bun,
        # uv, jq). Per-task language toolchains
        # (`rust@1.84.0` for the wasm32-wasip1 build, etc.) auto-install
        # on first `mise run` via the task's `use = [...]` declaration in
        # mise.toml — keeping per-recipe version flexibility. `uv` and
        # `jq` are needed by `repro:build:wheels`
        # (`scripts/build-layer1-wheels.sh`), which `repro:build` now
        # depends on per ADR-0040: wheels are built fresh from each
        # `src/layer1_wasm/<slug>/wheels/source.json` rather than
        # vendored.
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          install: true
          cache: true
          experimental: true
          install_args: bun uv jq

      - name: Configure GitHub Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0

      - name: Install ajv-cli for verdict schema validation
        # Validates each Layer 2 verdict.json against
        # `docs/site/public/spec/verdict.schema.json` (contract v1) right
        # after CI writes it, before the bundling step copies the
        # directory into the Pages artefact. Catches any malformed
        # snapshot at deploy time rather than letting it ship.
        #
        # Installed into a workflow-local `$RUNNER_TEMP` node_modules so
        # ajv-cli + ajv-formats co-resolve without depending on bun's
        # global bin being on PATH (`oven-sh/setup-bun` adds it,
        # mise-installed bun does not), and without leaking ajv into
        # any tracked package.json.
        run: |
          cd "$RUNNER_TEMP"
          bun init -y >/dev/null
          bun add ajv-cli@5 ajv-formats
          # Both forms — `$AJV_BIN` for explicit yaml callers, and the
          # bin dir on `$GITHUB_PATH` so shell scripts (e.g.
          # `scripts/capture_layer2_verdict.sh`) can call `ajv` directly
          # without knowing about this install location.
          echo "AJV_BIN=$RUNNER_TEMP/node_modules/.bin/ajv" >> "$GITHUB_ENV"
          echo "$RUNNER_TEMP/node_modules/.bin" >> "$GITHUB_PATH"

      - name: Build docs (mise run docs:build)
        # Same command a contributor runs locally — wraps
        # `bun install --frozen-lockfile` + `bun run build` for the
        # rspress site under docs/. See [tasks."docs:build"] in
        # mise.toml.
        working-directory: ${{ github.workspace }}
        run: mise run docs:build

      - name: Build Layer 1 reproductions (mise run repro:build)
        # Wraps `bun install --frozen-lockfile`, `bun run build`
        # (TypeScript -> .js next to each repro), and `cargo build`
        # for every `src/layer1_wasm/*/Cargo.toml` (with
        # `rustup target add wasm32-wasip1` ensured). See
        # [tasks."repro:build"] in mise.toml.
        working-directory: ${{ github.workspace }}
        run: mise run repro:build

      - name: Drop Rust build artefacts before bundling
        # `target/` is hundreds of MB and would bloat the Pages
        # artefact. The mise task copies repro.wasm into place; the
        # build cache itself is not needed once the artefact is in
        # the recipe directory.
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          for target in src/layer1_wasm/*/target; do
            rm -rf "$target"
          done

      - name: Log in to GHCR (for Layer 2 image push)
        # Skipped silently if no Layer 2 reproductions exist. Uses the
        # default `GITHUB_TOKEN`; the workflow's `packages: write`
        # permission lets us push to `ghcr.io/aletheia-works/*` without
        # a separately-rotated PAT.
        #
        # Fork users (running with VIVARIUM_FORK_DEPLOY=true) skip this
        # step — fork deploys ship Layer 1 only because the GITHUB_TOKEN
        # has no GHCR push scope into `ghcr.io/aletheia-works/*`.
        if: github.repository_owner == 'aletheia-works'
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          dockerfiles=(src/layer2_docker/*/Dockerfile)
          if [ ${#dockerfiles[@]} -eq 0 ]; then
            echo "No src/layer2_docker/*/Dockerfile; skipping GHCR login."
            exit 0
          fi
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io \
            -u "${{ github.actor }}" --password-stdin

      - name: Build, push, and snapshot Layer 2 Docker reproductions
        # Per-page convention (see src/layer2_docker/README.md and
        # ADR-0010): each `src/layer2_docker/<slug>/` ships a
        # `Dockerfile` whose default CMD is `repro.sh`. We build the
        # image, push two tags to GHCR (`:latest` and `:<git-sha>`),
        # run the container to capture the verdict, and write
        # `<slug>/verdict.json` so the bundling step picks it up
        # alongside the rest of the directory.
        #
        # Skipped silently if no Layer 2 reproductions exist.
        #
        # Fork users (running with VIVARIUM_FORK_DEPLOY=true) skip this
        # step — Layer 2 deploy stays upstream-only.
        if: github.repository_owner == 'aletheia-works'
        working-directory: ${{ github.workspace }}
        env:
          IMAGE_OWNER: aletheia-works
        run: |
          set -euo pipefail
          shopt -s nullglob
          for dockerfile in src/layer2_docker/*/Dockerfile; do
            slug_dir="$(dirname "$dockerfile")"
            slug="$(basename "$slug_dir")"
            # Skip underscore-prefixed sentinels (e.g. `_template/`,
            # `_layer2-shared/`) — same convention the recipes-index
            # walker follows in docs/scripts/generate-recipes-index.ts.
            case "$slug" in _*) continue ;; esac
            tag_latest="ghcr.io/${IMAGE_OWNER}/vivarium-${slug}:latest"
            tag_sha="ghcr.io/${IMAGE_OWNER}/vivarium-${slug}:${GITHUB_SHA}"

            echo "Building Layer 2 image: ${slug}"
            docker build --tag "$tag_latest" --tag "$tag_sha" "$slug_dir"

            echo "Pushing ${tag_latest} and ${tag_sha} to GHCR"
            docker push "$tag_latest"
            docker push "$tag_sha"

            # Capture the verdict by running the freshly-built image.
            stdout_file="$(mktemp)"
            stderr_file="$(mktemp)"
            set +e
            docker run --rm "$tag_latest" >"$stdout_file" 2>"$stderr_file"
            exit_code=$?
            set -e

            if [ "$exit_code" -eq 0 ]; then
              verdict="reproduced"
            else
              verdict="unreproduced"
            fi

            captured_at="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
            image_digest="$(docker inspect --format='{{index .RepoDigests 0}}' "$tag_sha" 2>/dev/null || echo '')"

            # Compose verdict.json. `jq -Rs .` JSON-quotes raw text;
            # we trim stderr to the last 4 KiB so a runaway log
            # doesn't bloat the Pages artefact.
            jq -n \
              --arg verdict "$verdict" \
              --arg image_tag "$tag_sha" \
              --arg image_digest "$image_digest" \
              --arg captured_at "$captured_at" \
              --arg stdout "$(cat "$stdout_file")" \
              --arg stderr_tail "$(tail -c 4096 "$stderr_file")" \
              --argjson exit_code "$exit_code" \
              '{
                contract: "v1",
                verdict: $verdict,
                exit_code: $exit_code,
                image_tag: $image_tag,
                image_digest: $image_digest,
                captured_at: $captured_at,
                stdout: $stdout,
                stderr_tail: $stderr_tail
              }' >"${slug_dir}/verdict.json"

            # Validate the freshly-written verdict.json against the
            # contract v1 schema before the bundling step picks it up.
            # Single-sourced with repro-regression.yml.
            "$AJV_BIN" validate \
              --spec=draft2020 \
              -c ajv-formats \
              -s "${GITHUB_WORKSPACE}/docs/site/public/spec/verdict.schema.json" \
              -d "${slug_dir}/verdict.json"

            rm -f "$stdout_file" "$stderr_file"
            echo "Captured verdict for ${slug}: ${verdict} (exit ${exit_code})"
          done

      - name: Bundle Layer 1 reproductions alongside docs
        # Each immediate subdirectory of `src/layer1_wasm/` is published at
        # `<pages-base>/repro/<project>/<issue_path>/`. The
        # `<project>/<issue_path>` URL path is looked up from the matching
        # entry in `docs/site/public/api/recipes.json` (regenerated by
        # `docs/scripts/generate-recipes-index.ts` during the docs:build
        # step above) so the bundling layout stays in lockstep with the
        # catalogue index. README files and other tracked source live next
        # to the reproduction for review; they get copied too, which is
        # fine — the pages are static.
        #
        # Two flavours of subdirectory:
        # 1. Reproduction pages — must contain `index.html`. Skipped if not.
        # 2. Underscore-prefixed scaffolding (`_shared/`, `_assets/`) —
        #    duplicated under each `<project>/` so recipes can keep their
        #    `../_shared/…` references intact under the new
        #    `<project>/<issue_path>/` URL shape (one directory level
        #    above the recipe). The cost is a few KB × N projects of
        #    duplication; the win is leaving every recipe's source
        #    untouched.
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          dest="docs/doc_build/repro"
          if [ ! -d src/layer1_wasm ]; then
            echo "No src/layer1_wasm/ directory; skipping bundling."
            exit 0
          fi
          mkdir -p "$dest"
          # Derived from the runtime context so fork deploys
          # (VIVARIUM_FORK_DEPLOY=true) bundle correctly under the
          # fork's own `<owner>.github.io/<repo>/repro/` URL.
          pages_prefix="https://${GITHUB_REPOSITORY_OWNER}.github.io/${GITHUB_REPOSITORY##*/}/repro/"
          # Stage shared scaffolding (`_shared/`, `_assets/`, ...) under
          # each Layer 1 project's directory so recipes' `../_shared/...`
          # refs resolve to `/repro/<project>/_shared/...`.
          layer1_projects="$(jq -r '.recipes[] | select(.layer == 1) | .project' \
            docs/site/public/api/recipes.json | sort -u)"
          for project in $layer1_projects; do
            mkdir -p "$dest/$project"
            for shared in src/layer1_wasm/_*/; do
              [ -d "$shared" ] || continue
              shared_name="$(basename "$shared")"
              echo "Staging Layer 1 shared module: ${shared_name} → ${dest}/${project}/${shared_name}"
              cp -R "${shared%/}" "$dest/$project/$shared_name"
            done
          done
          # Bundle each individual recipe.
          for recipe in src/layer1_wasm/*/; do
            slug="$(basename "$recipe")"
            case "$slug" in
              _*)
                continue
                ;;
            esac
            if [ ! -f "${recipe}index.html" ]; then
              echo "Skipping ${recipe} (no index.html)"
              continue
            fi
            page_url="$(jq -r --arg s "$slug" \
              '.recipes[] | select(.slug == $s) | .page_url' \
              docs/site/public/api/recipes.json)"
            if [ -z "$page_url" ] || [ "$page_url" = "null" ]; then
              echo "ERROR: ${slug} not found in docs/site/public/api/recipes.json"
              exit 1
            fi
            rel="${page_url#${pages_prefix}}"
            rel="${rel%/}"
            echo "Bundling reproduction: ${slug} → ${dest}/${rel}/"
            mkdir -p "$dest/$rel"
            # `cp -R "$recipe/."` copies the recipe directory's CONTENTS
            # (not the directory itself), so the recipe lands at $rel/
            # rather than $rel/$slug/.
            cp -R "${recipe}." "$dest/$rel/"
          done
          ls -la "$dest" || true

      - name: Bundle Layer 2 reproductions alongside docs
        # Layer 2 catalogue convention (per ADR-0010 / private memo):
        # each `src/layer2_docker/<slug>/` ships a `Dockerfile`,
        # `repro.sh`, `README.md`, and a CI-generated `verdict.json`.
        # Visitors don't run anything in-page; they consume the
        # Dockerfile + the verdict snapshot. Bundle the raw directory
        # under `<pages-base>/repro/<project>/<issue_path>/`, with the
        # URL path looked up from `docs/site/public/api/recipes.json` so the
        # mapping stays in lockstep with the catalogue. Underscore-
        # prefixed scaffolding (e.g. `_layer2-shared/`) is duplicated
        # under each Layer 2 project for the same `../_shared/...` →
        # `<project>/_shared/...` reason as Layer 1.
        #
        # Skipped silently when there are no Layer 2 reproductions.
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          dest="docs/doc_build/repro"
          if [ ! -d src/layer2_docker ]; then
            echo "No src/layer2_docker/ directory; skipping Layer 2 bundling."
            exit 0
          fi
          shopt -s nullglob
          mkdir -p "$dest"
          # Derived from the runtime context so fork deploys
          # (VIVARIUM_FORK_DEPLOY=true) bundle correctly under the
          # fork's own `<owner>.github.io/<repo>/repro/` URL.
          pages_prefix="https://${GITHUB_REPOSITORY_OWNER}.github.io/${GITHUB_REPOSITORY##*/}/repro/"
          # Stage shared scaffolding under each Layer 2 project.
          layer2_projects="$(jq -r '.recipes[] | select(.layer == 2) | .project' \
            docs/site/public/api/recipes.json | sort -u)"
          for project in $layer2_projects; do
            mkdir -p "$dest/$project"
            for shared in src/layer2_docker/_*/; do
              [ -d "$shared" ] || continue
              shared_name="$(basename "$shared")"
              # `_template/` is the scaffolder seed (used by
              # `mise run recipes:new`), not a shared runtime module.
              # Don't ship it under each project's deploy dir.
              case "$shared_name" in _template) continue ;; esac
              echo "Staging Layer 2 shared module: ${shared_name} → ${dest}/${project}/${shared_name}"
              cp -R "${shared%/}" "$dest/$project/$shared_name"
            done
            # Layer 2 pages reference `../_shared/style.css` for the
            # shared chrome (header, code blocks, verdict pill). The
            # styles physically live under src/layer1_wasm/_shared/ and
            # are reused by Layer 2 — copy them into each Layer 2
            # project so the relative path resolves under
            # `<dest>/<project>/_shared/style.css` after deploy.
            if [ -d "src/layer1_wasm/_shared" ]; then
              echo "Staging Layer 1 _shared/ for Layer 2 project: ${dest}/${project}/_shared"
              cp -R "src/layer1_wasm/_shared" "$dest/$project/_shared"
            fi
          done
          # Bundle each individual Layer 2 recipe.
          for entry in src/layer2_docker/*/; do
            slug="$(basename "$entry")"
            case "$slug" in
              _*)
                continue
                ;;
            esac
            if [ ! -f "${entry}Dockerfile" ]; then
              echo "Skipping ${entry} (no Dockerfile)"
              continue
            fi
            page_url="$(jq -r --arg s "$slug" \
              '.recipes[] | select(.slug == $s) | .page_url' \
              docs/site/public/api/recipes.json)"
            if [ -z "$page_url" ] || [ "$page_url" = "null" ]; then
              echo "ERROR: ${slug} not found in docs/site/public/api/recipes.json"
              exit 1
            fi
            rel="${page_url#${pages_prefix}}"
            rel="${rel%/}"
            echo "Bundling Layer 2 reproduction: ${slug} → ${dest}/${rel}/"
            mkdir -p "$dest/$rel"
            cp -R "${entry}." "$dest/$rel/"
          done
          ls -la "$dest" || true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: docs/doc_build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
