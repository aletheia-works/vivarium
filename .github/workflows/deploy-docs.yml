name: deploy-docs

# Builds the rspress docs site and deploys to GitHub Pages, alongside any
# Layer 1 (browser-native) PoC pages.
#
# Prerequisites (one-time setup):
# - Repo Settings → Pages → Source: "GitHub Actions".
#
# Tool versions:
# - `.mise.toml` declares `bun = "latest"` for local development.
# - CI uses `oven-sh/setup-bun` directly (an allowlisted action) rather
#   than `jdx/mise-action`, which is not on the repo's `selected-actions`
#   patterns. Keep `bun-version` in sync with the intent of `.mise.toml`.
#
# Layout:
# - `docs/` holds the rspress site (config, lockfile, markdown content).
# - `docs/docs/` is the rspress `root` and contains the markdown.
# - The build artefact is written to `docs/doc_build/`.
# - `src/layer1_wasm/<slug>/` directories are static Pyodide / WASM
#   reproductions. Sources are TypeScript; `tsc` emits side-by-side
#   `.js` files which are then copied verbatim into
#   `docs/doc_build/repro/<slug>/`. The `.js` outputs are gitignored —
#   the deploy step rebuilds them from the `.ts` sources via
#   `src/layer1_wasm/package.json`'s `build` script.
# - Underscore-prefixed subdirectories (e.g. `src/layer1_wasm/_shared/`)
#   hold scaffolding shared across reproductions. They are bundled
#   alongside reproductions under `repro/` without requiring an
#   `index.html`, so each reproduction can reference them via
#   `../_shared/…`.
# - Legacy `/poc/<slug>/` URLs (Phase 0 noun) get HTML meta-refresh
#   redirect pages pointing at the new `/repro/<slug>/` location, so
#   external links from before the migration continue to work.

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'src/layer1_wasm/**'
      - 'src/layer2_docker/**'
      - '.mise.toml'
      - '.github/workflows/deploy-docs.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  # Required to push images to ghcr.io/aletheia-works/* using the
  # default `GITHUB_TOKEN`. Layer 2 reproductions only.
  packages: write

# Serialise deploys to Pages — never cancel an in-flight deploy; queue.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: docs
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0 # for `lastUpdated` timestamps

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: latest

      - name: Configure GitHub Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build docs
        run: bun run build

      - name: Install Layer 1 dependencies
        # `src/layer1_wasm/` has its own bun lockfile (TypeScript devDep).
        # Keep this step ordered after `bun install` for the docs site so
        # the steps' caches are independent.
        working-directory: ${{ github.workspace }}/src/layer1_wasm
        run: bun install --frozen-lockfile

      - name: Build Layer 1 TypeScript sources
        # Emits side-by-side `.js` files for every `.ts` source — these
        # are what the bundling step below copies into the Pages artefact.
        working-directory: ${{ github.workspace }}/src/layer1_wasm
        run: bun run build

      - name: Install Rust toolchain (for compiled-language reproductions)
        # Vivarium pins Rust in `.mise.toml`; CI installs the same
        # version via rustup directly because `jdx/mise-action` is not
        # on the repo's allowlist. Adds the `wasm32-wasip1` target so
        # each `<slug>/Cargo.toml` can compile to a browser-loadable
        # artefact (the page boots it via `@bjorn3/browser_wasi_shim`).
        # Skipped silently if no Rust crate is present.
        #
        # Override the job-level `working-directory: docs` so the glob
        # below resolves against the repo root — without this the
        # `crates=(...)` array stays empty, the step exits early, and
        # the next step then fails with `can't find crate for 'core'`
        # because rustup never ran.
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          crates=(src/layer1_wasm/*/Cargo.toml)
          if [ ${#crates[@]} -eq 0 ]; then
            echo "No src/layer1_wasm/*/Cargo.toml; skipping Rust setup."
            exit 0
          fi
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs |
            sh -s -- -y --profile minimal --default-toolchain 1.84.0
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
          "$HOME/.cargo/bin/rustup" target add wasm32-wasip1

      - name: Build Layer 1 Rust artefacts (wasm32-wasip1)
        # Compiles every `src/layer1_wasm/<slug>/Cargo.toml` for
        # `wasm32-wasip1` and copies the resulting `.wasm` next to
        # the page's `index.html` (`<slug>/repro.wasm`), where the
        # subsequent bundling step copies it into the Pages artefact
        # alongside the rest of the directory. The bin name is fixed
        # at `repro` by convention so this step needs no per-crate
        # hand-wiring.
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          for cargo_toml in src/layer1_wasm/*/Cargo.toml; do
            slug_dir="$(dirname "$cargo_toml")"
            slug="$(basename "$slug_dir")"
            echo "Building Rust crate: ${slug}"
            (
              cd "$slug_dir"
              cargo build --release --target wasm32-wasip1
            )
            cp "${slug_dir}/target/wasm32-wasip1/release/repro.wasm" \
              "${slug_dir}/repro.wasm"
            # Drop the build artefacts before the bundling step copies
            # the directory — `target/` is hundreds of MB and would
            # bloat the Pages artefact otherwise.
            rm -rf "${slug_dir}/target"
          done

      - name: Log in to GHCR (for Layer 2 image push)
        # Skipped silently if no Layer 2 reproductions exist. Uses the
        # default `GITHUB_TOKEN`; the workflow's `packages: write`
        # permission lets us push to `ghcr.io/aletheia-works/*` without
        # a separately-rotated PAT.
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          dockerfiles=(src/layer2_docker/*/Dockerfile)
          if [ ${#dockerfiles[@]} -eq 0 ]; then
            echo "No src/layer2_docker/*/Dockerfile; skipping GHCR login."
            exit 0
          fi
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io \
            -u "${{ github.actor }}" --password-stdin

      - name: Build, push, and snapshot Layer 2 Docker reproductions
        # Per-page convention (see src/layer2_docker/README.md and
        # ADR-0010): each `src/layer2_docker/<slug>/` ships a
        # `Dockerfile` whose default CMD is `repro.sh`. We build the
        # image, push two tags to GHCR (`:latest` and `:<git-sha>`),
        # run the container to capture the verdict, and write
        # `<slug>/verdict.json` so the bundling step picks it up
        # alongside the rest of the directory.
        #
        # Skipped silently if no Layer 2 reproductions exist.
        working-directory: ${{ github.workspace }}
        env:
          IMAGE_OWNER: aletheia-works
        run: |
          set -euo pipefail
          shopt -s nullglob
          for dockerfile in src/layer2_docker/*/Dockerfile; do
            slug_dir="$(dirname "$dockerfile")"
            slug="$(basename "$slug_dir")"
            tag_latest="ghcr.io/${IMAGE_OWNER}/vivarium-${slug}:latest"
            tag_sha="ghcr.io/${IMAGE_OWNER}/vivarium-${slug}:${GITHUB_SHA}"

            echo "Building Layer 2 image: ${slug}"
            docker build --tag "$tag_latest" --tag "$tag_sha" "$slug_dir"

            echo "Pushing ${tag_latest} and ${tag_sha} to GHCR"
            docker push "$tag_latest"
            docker push "$tag_sha"

            # Capture the verdict by running the freshly-built image.
            stdout_file="$(mktemp)"
            stderr_file="$(mktemp)"
            set +e
            docker run --rm "$tag_latest" >"$stdout_file" 2>"$stderr_file"
            exit_code=$?
            set -e

            if [ "$exit_code" -eq 0 ]; then
              verdict="pass"
            else
              verdict="fail"
            fi

            captured_at="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
            image_digest="$(docker inspect --format='{{index .RepoDigests 0}}' "$tag_sha" 2>/dev/null || echo '')"

            # Compose verdict.json. `jq -Rs .` JSON-quotes raw text;
            # we trim stderr to the last 4 KiB so a runaway log
            # doesn't bloat the Pages artefact.
            jq -n \
              --arg verdict "$verdict" \
              --arg image_tag "$tag_sha" \
              --arg image_digest "$image_digest" \
              --arg captured_at "$captured_at" \
              --arg stdout "$(cat "$stdout_file")" \
              --arg stderr_tail "$(tail -c 4096 "$stderr_file")" \
              --argjson exit_code "$exit_code" \
              '{
                contract: "v1",
                verdict: $verdict,
                exit_code: $exit_code,
                image_tag: $image_tag,
                image_digest: $image_digest,
                captured_at: $captured_at,
                stdout: $stdout,
                stderr_tail: $stderr_tail
              }' >"${slug_dir}/verdict.json"

            rm -f "$stdout_file" "$stderr_file"
            echo "Captured verdict for ${slug}: ${verdict} (exit ${exit_code})"
          done

      - name: Bundle Layer 1 reproductions alongside docs
        # Each immediate subdirectory of `src/layer1_wasm/` is published at
        # `<pages-base>/repro/<slug>/`. README files and other tracked
        # source live next to the reproduction for review; they get copied
        # too, which is fine — the pages are static.
        #
        # Two flavours of subdirectory:
        # 1. Reproduction pages — must contain `index.html`. Skipped if not.
        #    Also gets an HTML meta-refresh redirect page at
        #    `<pages-base>/poc/<slug>/` to keep legacy URLs working.
        # 2. Underscore-prefixed scaffolding (e.g. `_shared/`) — bundled
        #    unconditionally under `repro/` so each reproduction can
        #    reference shared modules via `../_shared/…` after deploy.
        #    No `/poc/_shared/` redirect — it was never a public URL.
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          dest="docs/doc_build/repro"
          legacy_dest="docs/doc_build/poc"
          if [ ! -d src/layer1_wasm ]; then
            echo "No src/layer1_wasm/ directory; skipping bundling."
            exit 0
          fi
          mkdir -p "$dest"
          for poc in src/layer1_wasm/*/; do
            slug="$(basename "$poc")"
            case "$slug" in
              _*)
                echo "Bundling shared module: ${slug}"
                cp -R "$poc" "$dest/"
                ;;
              *)
                if [ ! -f "${poc}index.html" ]; then
                  echo "Skipping ${poc} (no index.html)"
                  continue
                fi
                echo "Bundling reproduction: ${slug}"
                cp -R "$poc" "$dest/"
                # Legacy `/poc/<slug>/` redirect — HTML meta-refresh is
                # the simplest mechanism that works on GitHub Pages
                # (which has no native server-side 301 support).
                mkdir -p "$legacy_dest/$slug"
                cat > "$legacy_dest/$slug/index.html" <<HTML
          <!doctype html>
          <html lang="en">
            <head>
              <meta charset="utf-8" />
              <title>Vivarium · moved to /repro/${slug}/</title>
              <meta http-equiv="refresh" content="0; url=../../repro/${slug}/" />
              <link rel="canonical" href="../../repro/${slug}/" />
              <meta name="robots" content="noindex" />
            </head>
            <body>
              <p>This reproduction has moved to
                <a href="../../repro/${slug}/">/repro/${slug}/</a>.
                Updating in a moment…</p>
            </body>
          </html>
          HTML
                ;;
            esac
          done
          ls -la "$dest" || true
          ls -la "$legacy_dest" || true

      - name: Bundle Layer 2 reproductions alongside docs
        # Layer 2 catalogue convention (per ADR-0010 / private memo):
        # each `src/layer2_docker/<slug>/` ships a `Dockerfile`,
        # `repro.sh`, `README.md`, and a CI-generated `verdict.json`.
        # Visitors don't run anything in-page; they consume the
        # Dockerfile + the verdict snapshot. Bundle the raw directory
        # under `<pages-base>/repro/<slug>/` so the gallery and
        # README links resolve directly.
        #
        # Skipped silently when there are no Layer 2 reproductions.
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          dest="docs/doc_build/repro"
          if [ ! -d src/layer2_docker ]; then
            echo "No src/layer2_docker/ directory; skipping Layer 2 bundling."
            exit 0
          fi
          shopt -s nullglob
          mkdir -p "$dest"
          for entry in src/layer2_docker/*/; do
            slug="$(basename "$entry")"
            case "$slug" in
              _*)
                # Underscore-prefixed dirs are shared scaffolding
                # (e.g. `_layer2-shared/` with the verdict
                # snapshot renderer). Bundle them under the same
                # `<pages-base>/repro/` root so per-page
                # `index.html` files can reference
                # `../_layer2-shared/...`.
                echo "Bundling Layer 2 shared module: ${slug}"
                cp -R "$entry" "$dest/"
                continue
                ;;
            esac
            if [ ! -f "${entry}Dockerfile" ]; then
              echo "Skipping ${entry} (no Dockerfile)"
              continue
            fi
            echo "Bundling Layer 2 reproduction: ${slug}"
            cp -R "$entry" "$dest/"
          done
          ls -la "$dest" || true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: docs/doc_build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
