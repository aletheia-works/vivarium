name: deploy-docs

# Builds the rspress docs site and deploys to GitHub Pages.
#
# Prerequisites (one-time setup):
# - Repo Settings → Pages → Source: "GitHub Actions".
#
# Tool versions:
# - `.mise.toml` declares `bun = "latest"` for local development.
# - CI uses `oven-sh/setup-bun` directly (an allowlisted action) rather
#   than `jdx/mise-action`, which is not on the repo's `selected-actions`
#   patterns. Keep `bun-version` in sync with the intent of `.mise.toml`.
#
# Layout:
# - `docs/` holds the rspress site (config, lockfile, markdown content).
# - `docs/docs/` is the rspress `root` and contains the markdown.
# - The build artefact is written to `docs/doc_build/`.

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - '.mise.toml'
      - '.github/workflows/deploy-docs.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Serialise deploys to Pages — never cancel an in-flight deploy; queue.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: docs
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0 # for `lastUpdated` timestamps

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: latest

      - name: Configure GitHub Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build docs
        run: bun run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: docs/doc_build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
