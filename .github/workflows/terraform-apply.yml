name: Terraform Apply

# Thin caller for the org-wide reusable workflow at
# aletheia-works/.github/.github/workflows/terraform-apply.yml.
#
# The workflow name above must stay as "Terraform Apply" because
# terraform-state-backup.yml's `workflow_run` listener matches on it.

on:
  push:
    branches:
      - main
    paths:
      - 'infra/github/**'
      - '.github/workflows/terraform-apply.yml'
  workflow_dispatch:

permissions:
  contents: read
  # Required by the reusable workflow to read and write the state artifact.
  actions: write
  # Required by the reusable workflow to file an apply-failure issue.
  issues: write

jobs:
  apply:
    # Skip on forks. Apply mutates real org infrastructure and depends on
    # repo-scoped secrets/variables (TF_TOKEN_GITHUB, LATEST_APPLY_RUN_ID)
    # that don't exist in forks, so an upstream-sync push to a fork's main
    # would otherwise trigger a guaranteed failure run.
    if: github.repository_owner == 'aletheia-works'
    # Pinned by commit SHA (org enforces sha_pinning_required).
    uses: aletheia-works/.github/.github/workflows/terraform-apply.yml@2869d127c99b5cd8bcfb22d7ade8a31d1204019c # main
    with:
      working_directory: infra/github
    secrets: inherit
