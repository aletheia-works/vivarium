name: repro-regression

# Regression test for the Layer 1 reproduction gallery.
#
# Runs the Playwright suite under `src/layer1_wasm/tests/` against a
# locally-served copy of the gallery, asserting that each reproduction
# page reaches its documented verdict and exposes the vivarium contract
# v1 surface (DOM `#verdict[data-verdict]`, `__VIVARIUM_VERDICT__`,
# `__VIVARIUM_RESULT__`, `<meta name="vivarium-contract">`).
#
# A `pass` verdict means the upstream bug still reproduces on the
# bundled Pyodide build; a `fail` verdict means either the upstream
# project shipped a fix that Pyodide picked up, or the runtime
# regressed. Either case is signal — the workflow turns it into a
# loud red CI failure so a human can decide what to do (retire the
# page, file an upstream-fix-detection Issue, etc.).
#
# Triggers:
# - `push` to `main` touching Layer 1 sources / this workflow / the
#   deploy workflow — fast feedback when contributors break things.
# - `pull_request` touching the same paths — reviewers see the result
#   on the PR.
# - Weekly schedule — catches Pyodide-bundle drift even when the repo
#   itself is quiet, so an upstream fix that lands a month after our
#   last commit still surfaces within ~7 days.
# - `workflow_dispatch` — manual trigger from the Actions tab.
#
# External manifest validation (every trigger):
#
# `src/external_examples/*/.vivarium/manifest.toml` are validated
# against `docs/public/spec/manifest.schema.json` (Vivarium Manifest
# v1; locked by ADR-0015). The workflow converts each TOML manifest
# to JSON via Python's stdlib `tomllib` and runs ajv against the
# JSON Schema. Phase 5 sub-stream C deliverable.
#
# Layer 2 verdict drift (schedule + workflow_dispatch only):
#
# A separate step at the end of the Layer 2 lane contrasts the
# freshly-captured `verdict.json` against the verdict.json currently
# published on GitHub Pages (i.e., the last green main deploy). A
# divergence means the recipe's environment changed without the repo
# changing — usually an upstream package or base-image refresh — and
# the workflow fails red so GitHub's native workflow-failure email
# alerts the maintainer.
#
# The step is gated to `schedule` and `workflow_dispatch` because
# `push` and `pull_request` are expected-drift triggers (the recipe
# change is the point); the existing Playwright assertions cover
# regression for those triggers. Layer 1 drift is covered by
# Playwright as well. Layer 3 cannot capture in CI per ADR-0011, so
# no drift step exists there — the committed snapshot is the source
# of truth and is already shape-checked.

on:
  push:
    branches: [main]
    paths:
      - 'src/layer1_wasm/**'
      - 'src/layer2_docker/**'
      - 'src/layer3_thirdway/**'
      - 'src/external_examples/**'
      - 'docs/public/spec/**.schema.json'
      - '.github/workflows/repro-regression.yml'
      - '.github/workflows/deploy-docs.yml'
  pull_request:
    paths:
      - 'src/layer1_wasm/**'
      - 'src/layer2_docker/**'
      - 'src/layer3_thirdway/**'
      - 'src/external_examples/**'
      - 'docs/public/spec/**.schema.json'
      - '.github/workflows/repro-regression.yml'
      - '.github/workflows/deploy-docs.yml'
  schedule:
    # Mondays at 00:00 UTC.
    - cron: '0 0 * * 1'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: repro-regression-${{ github.ref }}
  cancel-in-progress: true

jobs:
  regression:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: src/layer1_wasm
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: latest

      - name: Install Layer 1 dependencies
        run: bun install --frozen-lockfile

      - name: Install ajv-cli for verdict schema validation
        # Single-source clause 4 of the contract v1 conformance check
        # (`docs/public/spec/verdict.schema.json`) by validating every
        # generated / tracked `verdict.json` with ajv-cli below, instead
        # of the historical `jq -e` predicate. Both Layer 2 (CI-built,
        # CI-snapshot) and Layer 3 (maintainer-tracked) verdict files
        # share the same schema. `bun add --global` puts `ajv` on
        # PATH for subsequent steps via setup-bun's PATH wiring.
        #
        # The same ajv install is also reused below for the Phase 5
        # sub-stream C manifest schema validation (manifest.schema.json
        # against `src/external_examples/*/.vivarium/manifest.toml` after
        # a TOML→JSON conversion via Python's stdlib `tomllib`).
        working-directory: ${{ github.workspace }}
        run: bun add --global ajv-cli@5 ajv-formats

      - name: Validate external manifest examples (manifest v1)
        # Phase 5 sub-stream C (ADR-0015, private memo). Each
        # `src/external_examples/*/.vivarium/manifest.toml` is converted
        # to JSON via Python stdlib `tomllib` (Python 3.11+; preinstalled
        # on `ubuntu-latest`) and validated against
        # `docs/public/spec/manifest.schema.json`. Schema mismatch fails
        # the workflow loudly so the spec page and the reference
        # examples stay in lockstep.
        #
        # Skipped silently when the directory is absent (early-bootstrap
        # state) or empty.
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          manifests=(src/external_examples/*/.vivarium/manifest.toml)
          if [ ${#manifests[@]} -eq 0 ]; then
            echo "No src/external_examples/*/.vivarium/manifest.toml; skipping."
            exit 0
          fi
          schema="docs/public/spec/manifest.schema.json"
          if [ ! -f "$schema" ]; then
            echo "::error::Manifest schema missing at ${schema}"
            exit 1
          fi
          fail=0
          tmp_json="$(mktemp --suffix=.json)"
          trap 'rm -f "$tmp_json"' EXIT
          for manifest in "${manifests[@]}"; do
            example="$(basename "$(dirname "$(dirname "$manifest")")")"
            echo "Validating ${example}: ${manifest}"
            python3 -c "import json, sys, tomllib; sys.stdout.write(json.dumps(tomllib.load(open(sys.argv[1], 'rb'))))" "$manifest" > "$tmp_json"
            if ! ajv validate \
              --spec=draft2020 \
              -c ajv-formats \
              -s "$schema" \
              -d "$tmp_json"; then
              echo "::error::Manifest validation failed for ${example} (${manifest})"
              fail=$((fail + 1))
            fi
          done
          if [ "$fail" -gt 0 ]; then
            echo "::error::${fail} external manifest example(s) failed schema validation."
            exit 1
          fi
          echo "All ${#manifests[@]} external manifest example(s) validated against manifest v1 schema."

      - name: Type-check (sources + tests)
        # Catches any TypeScript-level regression before we boot a
        # browser. Cheap (~1 s) and produces a clear diagnostic on
        # failure.
        run: bun run typecheck

      - name: Build Layer 1 TypeScript sources
        # Emits side-by-side `.js` files; the static server serves
        # them at runtime.
        run: bun run build

      - name: Install Rust toolchain (for compiled-language reproductions)
        # Mirrors the equivalent step in `deploy-docs.yml`: installs
        # rustup directly because `jdx/mise-action` is not on the
        # repo's selected-actions allowlist, and adds the
        # `wasm32-wasip1` target so each `<slug>/Cargo.toml` can
        # compile to the artefact the page fetches at runtime.
        # Skipped silently if no Rust crate is present so the
        # regression suite stays cheap when Phase 2 has no Rust
        # entries yet.
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          crates=(src/layer1_wasm/*/Cargo.toml)
          if [ ${#crates[@]} -eq 0 ]; then
            echo "No src/layer1_wasm/*/Cargo.toml; skipping Rust setup."
            exit 0
          fi
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs |
            sh -s -- -y --profile minimal --default-toolchain 1.84.0
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
          "$HOME/.cargo/bin/rustup" target add wasm32-wasip1

      - name: Build Layer 1 Rust artefacts (wasm32-wasip1)
        # Mirrors `deploy-docs.yml`. Compiles every Cargo.toml to
        # `wasm32-wasip1` and copies the resulting `.wasm` next to
        # the page's `index.html` (`<slug>/repro.wasm`), where the
        # Playwright webServer serves it.
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          for cargo_toml in src/layer1_wasm/*/Cargo.toml; do
            slug_dir="$(dirname "$cargo_toml")"
            slug="$(basename "$slug_dir")"
            echo "Building Rust crate: ${slug}"
            (
              cd "$slug_dir"
              cargo build --release --target wasm32-wasip1
            )
            cp "${slug_dir}/target/wasm32-wasip1/release/repro.wasm" \
              "${slug_dir}/repro.wasm"
          done

      - name: Build, run, and snapshot Layer 2 Docker reproductions (no push)
        # Mirrors the deploy-docs Layer 2 build/run/verdict step but
        # skips GHCR login + image push (those are deploy-time
        # concerns). The `verdict.json` snapshot is written so the
        # Playwright suite below — which loads each Layer 2 page from
        # the auto-started Layer 2 webServer — can read CI's actual
        # capture rather than fall through to "verdict snapshot
        # unavailable: HTTP 404" and report `fail`.
        #
        # The capture itself is delegated to
        # `scripts/capture_layer2_verdict.sh`, which is also the
        # single source for the Phase 6 R.2 branch-fix verdict
        # workflow at `.github/workflows/branch-fix-verdict.yml`.
        #
        # Skipped silently when there are no Layer 2 reproductions.
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          for dockerfile in src/layer2_docker/*/Dockerfile; do
            slug_dir="$(dirname "$dockerfile")"
            slug="$(basename "$slug_dir")"
            tag="vivarium-${slug}:test"
            echo "Building Layer 2 image for regression: ${slug}"
            docker build --tag "$tag" "$slug_dir"

            bash scripts/capture_layer2_verdict.sh \
              "$tag" \
              "${slug_dir}/verdict.json"

            verdict=$(jq -r '.verdict' "${slug_dir}/verdict.json")
            exit_code=$(jq -r '.exit_code' "${slug_dir}/verdict.json")

            # Pass-expected for now. A future `fail`-expected sentinel
            # page would need the Playwright spec to flag it, which we
            # check there, not here — the regression-suite step just
            # records the verdict honestly.
            if [ "$exit_code" -ne 0 ]; then
              echo "::warning::Layer 2 reproduction ${slug} exited ${exit_code}; downstream Playwright step will assert verdict expectations"
            fi
            echo "Layer 2 reproduction ${slug}: verdict=${verdict} (exit ${exit_code})"
          done

      - name: Detect Layer 2 verdict drift vs deployed Pages snapshot
        # Phase 5 sub-stream A' (ADR-0013, private memo). Compares the
        # `verdict.json` we just captured against the one currently
        # published on GitHub Pages. A divergence on the weekly cron
        # (or a manual `workflow_dispatch`) means the recipe is
        # behaving differently than it did at last green-main deploy
        # while no commit landed in between — i.e., upstream/runtime
        # drift the maintainer needs to look at.
        #
        # `push` / `pull_request` are intentionally not covered: those
        # are expected-drift triggers (a PR's whole point may be to
        # change the verdict), and the Playwright step further down
        # already turns recipe regression into a red CI failure for
        # those triggers via the per-page expected verdict.
        #
        # Failure modes:
        # - HTTP 200 + verdict differs       → `::error::` + fail.
        # - HTTP 404 (recipe not yet on
        #   Pages, e.g. just-added recipe)   → info, skip.
        # - HTTP 5xx / DNS / timeout         → `::warning::`, skip
        #                                      (transient CDN flake
        #                                      should not raise a
        #                                      false drift alarm).
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        working-directory: ${{ github.workspace }}
        env:
          PAGES_BASE: https://aletheia-works.github.io/vivarium/repro
        run: |
          set -euo pipefail
          shopt -s nullglob

          drift=0
          checked=0
          tmp_deployed="$(mktemp)"
          trap 'rm -f "$tmp_deployed"' EXIT

          for vf in src/layer2_docker/*/verdict.json; do
            slug="$(basename "$(dirname "$vf")")"
            captured=$(jq -r '.verdict' "$vf")
            url="${PAGES_BASE}/${slug}/verdict.json"

            http_status=$(curl -sS \
              --connect-timeout 5 \
              --max-time 15 \
              --retry 2 \
              --retry-delay 2 \
              -o "$tmp_deployed" \
              -w '%{http_code}' \
              "$url" || echo "000")

            case "$http_status" in
              200)
                checked=$((checked + 1))
                if ! deployed=$(jq -r '.verdict' "$tmp_deployed" 2>/dev/null); then
                  echo "::warning::Layer 2 ${slug}: deployed snapshot at ${url} is not valid JSON — skipped"
                  continue
                fi
                if [ "$captured" != "$deployed" ]; then
                  echo "::error::Layer 2 verdict drift on ${slug}: deployed=${deployed} captured=${captured} (see ${url})"
                  drift=$((drift + 1))
                else
                  echo "Layer 2 ${slug}: deployed=${deployed} captured=${captured} (no drift)"
                fi
                ;;
              404)
                echo "Layer 2 ${slug}: no deployed snapshot at ${url} (new recipe?) — skipped"
                ;;
              000)
                echo "::warning::Layer 2 ${slug}: deployed snapshot fetch failed (DNS/timeout/network) — skipped"
                ;;
              *)
                echo "::warning::Layer 2 ${slug}: deployed snapshot fetch returned HTTP ${http_status} — skipped (transient)"
                ;;
            esac
          done

          echo "Layer 2 drift check: ${checked} recipe(s) compared, ${drift} drift(s) detected."
          if [ "$drift" -gt 0 ]; then
            echo "::error::${drift} Layer 2 recipe(s) drifted from their deployed verdict — upstream/runtime appears to have changed since the last green main deploy. Investigate (recipe regression vs upstream-fix-detected) and either update the recipe or accept the new verdict by re-deploying."
            exit 1
          fi

      - name: Build Layer 3 rr-replay reproductions (no run, no push)
        # Layer 3 cannot run replay in CI — Azure Hyper-V exposes
        # neither the PMU (record) nor CPUID faulting (cross-CPU
        # replay) to GHA hosted runners; see
        # `src/layer3_thirdway/README.md` and ADR-0011. CI's job is
        # reduced to verifying the Dockerfile still builds (catches
        # base-image / package / `ADD <trace.url>` drift) and that
        # the committed `verdict.json` snapshot conforms to the
        # contract. The verdict snapshot itself is generated locally
        # by the maintainer at recording time and is the source of
        # truth.
        #
        # Skipped silently when there are no Layer 3 reproductions.
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          for dockerfile in src/layer3_thirdway/*/Dockerfile; do
            slug_dir="$(dirname "$dockerfile")"
            slug="$(basename "$slug_dir")"
            tag="vivarium-${slug}:test"

            verdict_file="${slug_dir}/verdict.json"
            if [ ! -f "$verdict_file" ]; then
              echo "::error::Layer 3 recipe ${slug} is missing tracked verdict.json"
              exit 1
            fi
            # Schema-validate the tracked verdict.json against the
            # contract v1 schema. Replaces the historical `jq -e`
            # predicate; ajv reports the offending field on failure.
            ajv validate \
              --spec=draft2020 \
              -c ajv-formats \
              -s "${GITHUB_WORKSPACE}/docs/public/spec/verdict.schema.json" \
              -d "$verdict_file" || {
                echo "::error::Layer 3 recipe ${slug} has malformed verdict.json (failed schema validation)"
                cat "$verdict_file"
                exit 1
              }
            verdict=$(jq -r '.verdict' "$verdict_file")

            echo "Building Layer 3 image for regression: ${slug}"
            docker build --tag "$tag" "$slug_dir"

            echo "Layer 3 reproduction ${slug}: build OK; tracked verdict=${verdict}"
          done

      - name: Install Playwright browsers
        # `--with-deps` brings in the system libraries Chromium needs
        # (libnss3, libatk-bridge, etc.). The runner is fresh so the
        # apt step is unavoidable; total step time is ~30 s.
        run: bunx playwright install --with-deps chromium

      - name: Run Playwright regression suite
        # `playwright.config.ts` auto-starts `python -m http.server`
        # on the layer1 root, so the test cases can hit
        # `/_shared/_test/`, `/pandas-56679/`, `/numpy-28287/`.
        # Python 3 is preinstalled on `ubuntu-latest` runners.
        run: bun run test
        env:
          CI: 'true'

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-report-${{ github.run_id }}
          path: src/layer1_wasm/playwright-report/
          retention-days: 14
